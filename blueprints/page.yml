label: Page SEO
columns:

  preview:
    width: 1/3
    sticky: true
    sections:
      seoPreview:
        type: seo-preview
        label: SEO Preview

  seodata:
    width: 2/3
    sticky: true
    type: fields
    label: SEO Settings
    icon: seo
    fields:
      aiGenerator:
        type: seo-ai-generator
        label: AI Description Generator
        help: Generate descriptions automatically using AI
        sourceField: text
        targetField: metaDescription

      seo:
        type: object
        label: false
        fields:
          metaTitle:
            label: Meta Title
            type: text
            placeholder: "{{ page.title }} | {{ site.title }}"
            help: Title for search engines

          metaDescription:
            label: Meta Description
            type: textarea
            buttons: false
            maxlength: 160
            counter: true
            help: Description for search engines (max 160 characters)

          metaKeywords:
            label: Keywords
            type: tags
            help: Comma-separated keywords
            width: 1/2

          canonicalUrl:
            label: Canonical URL
            type: url
            help: Custom canonical URL
            width: 1/2

          noIndex:
            label: Hide from search engines
            type: toggle
            text: [yes, no]
            width: 1/2

          separator1:
            type: info
            text: Social Media Settings
            theme: positive

          ogTitle:
            label: Social Media Title
            type: text
            placeholder: "{{ page.title }}"
            help: Title for social media shares

          ogDescription:
            label: Social Media Description
            type: textarea
            buttons: false
            maxlength: 160
            counter: true
            help: Description for social media

          ogImage:
            label: Social Media Image
            type: files
            max: 1
            layout: cards
            size: small
            help: "Recommended: 1200×630px for Facebook/WhatsApp. Twitter prefers 2:1 (800×400px), but 1200×630 works well for both."

