label: SEO & Sitemap
icon: search
columns:
  seo:
    type: fields
    label: SEO
    icon: seo
    fields:
      seoSettings:
        extends: fields/site-seo-group

  social:
    width: 1/1
    type: fields
    label: Social Media
    icon: share
    fields:
      metaKitSocialSites:
        label: Social Media Profiles
        type: structure
        fields:
          platform:
            label: Platform
            type: select
            options:
              - { value: 'facebook', text: 'Facebook' }
              - { value: 'twitter', text: 'X (Twitter)' }
              - { value: 'instagram', text: 'Instagram' }
              - { value: 'linkedin', text: 'LinkedIn' }
              - { value: 'youtube', text: 'YouTube' }
              - { value: 'tiktok', text: 'TikTok' }
              - { value: 'pinterest', text: 'Pinterest' }
              - { value: 'github', text: 'GitHub' }
          url:
            label: Profile URL
            type: url

  otherSettings:
    width: 1/1
    type: fields
    fields:
      otherSettings:
        label:
        type: info
        text: The following settings are language independent. Please set the in the default language. You can also set them in the options (e.g. config.php).
        theme: positive

  openrouter:
    width: 1/2
    type: fields
    label: AI Settings
    icon: ai
    fields:
      metaKitOpenrouter:
        label: OpenRouter Settings
        type: blocks
        fieldsets:
          - mk-openrouter
        max: 1
        empty: false
        pretty: true

  sitemap:
    width: 1/2
    type: fields
    label: Sitemap
    icon: sitemap
    fields:
      metaKitSitemap:
        label: Sitemap Settings
        type: blocks
        fieldsets:
          - mk-sitemap
        max: 1
        empty: false
        pretty: true

  robots:
    width: 1/1
    type: fields
    label: Robots.txt
    icon: robot
    fields:
      metaKitRobots:
        label: Robots.txt Settings
        type: blocks
        help: Configure robots.txt rules for search engine crawlers. Available at /robots.txt
        fieldsets:
          - mk-robots
        max: 1
        empty: false
        pretty: true
