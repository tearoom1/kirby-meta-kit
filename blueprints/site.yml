label: SEO & Social Media
columns:
  seo:
    type: fields
    label: SEO
    icon: seo
    fields:
      seo:
        label: SEO Settings
        type: blocks
        fieldsets:
          - seo-settings
        max: 1
        empty: false
        default:
          - type: seo-settings
            content:
              appendSiteName: true
              titleSeparator: '|'

  ai:
    width: 1/2
    type: fields
    label: AI Settings
    icon: ai
    fields:
      openrouter:
        label: OpenRouter Settings
        type: blocks
        fieldsets:
          - openrouter
        max: 1
        empty: false
        default:
          - type: openrouter
            content:
              model: 'meta-llama/llama-3.2-3b-instruct:free'
              temperature: 0.7

  sitemap:
    width: 1/2
    type: fields
    label: Sitemap
    icon: sitemap
    fields:
      sitemap:
        label: Sitemap Settings
        type: blocks
        fieldsets:
          - sitemap
        max: 1
        empty: false
        default:
          - type: sitemap
            content:
              priorityHome: 1.0
              priorityDefault: 0.8

  social:
    width: 1/2
    type: fields
    label: Social Media
    icon: share
    fields:
      socialSites:
        label: Social Media Profiles
        type: structure
        fields:
          platform:
            label: Platform
            type: select
            options:
              - { value: 'facebook', text: 'Facebook' }
              - { value: 'twitter', text: 'X (Twitter)' }
              - { value: 'instagram', text: 'Instagram' }
              - { value: 'linkedin', text: 'LinkedIn' }
              - { value: 'youtube', text: 'YouTube' }
              - { value: 'tiktok', text: 'TikTok' }
              - { value: 'pinterest', text: 'Pinterest' }
              - { value: 'github', text: 'GitHub' }
          url:
            label: Profile URL
            type: url
