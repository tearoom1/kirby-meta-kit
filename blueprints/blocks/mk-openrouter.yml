name: OpenRouter Settings
icon: ai
preview: fields
wysiwyg: true
fields:
  infoAi:
    type: info
    label: AI Integration
    text: AI features will be automatically disabled if the API key and model is not configured either here or in the config.
    theme: info
    translate: false
  apiKey:
    label: OpenRouter API Key
    type: text
    help: Your OpenRouter API key for AI-generated descriptions. Leave empty to disable AI features.
    width: 1/2
    translate: false
  model:
    label: AI Model
    type: select
    options:
      - { value: 'google/gemma-4-31b-it:free', text: 'Gemma 4 31B (Free test model)' }
      - { value: 'meta-llama/llama-3.2-3b-instruct:free', text: 'Llama 3.2 3B (Free test model)' }
      - { value: 'nvidia/nemotron-3-nano-30b-a3b:free', text: 'Nemotron 3 Nano 30B (Free test model)' }
      - { value: 'openai/gpt-5', text: 'GPT-5 (Paid)' }
      - { value: 'openai/gpt-5-mini', text: 'GPT-5 Mini (Paid)' }
      - { value: 'openai/gpt-4o-mini', text: 'GPT-4o Mini (Paid)' }
      - { value: 'openai/gpt-4o', text: 'GPT-4o (Paid)' }
      - { value: 'anthropic/claude-sonnet-4.5', text: 'Claude Sonnet 4.5 (Paid)' }
      - { value: 'anthropic/claude-haiku-4.5', text: 'Claude Haiku 4.5 (Paid)' }
      - { value: 'anthropic/claude-3.5-sonnet', text: 'Claude 3.5 Sonnet (Paid)' }
      - { value: 'google/gemini-pro-1.5', text: 'Gemini 1.5 Pro (Paid)' }
      - { value: 'google/gemini-flash-1.5', text: 'Gemini 1.5 Flash (Paid)' }
      - { value: 'mistralai/mistral-large', text: 'Mistral Large (Paid)' }
      - { value: 'meta-llama/llama-3.3-70b-instruct', text: 'Llama 3.3 70B (Paid)' }
      - { value: 'deepseek/deepseek-chat', text: 'DeepSeek Chat V3 (Paid)' }
    default: "google/gemma-4-31b-it:free"
    width: 1/2
    translate: false
  temperature:
    label: Creativity Level
    type: range
    min: 0.1
    max: 1.0
    step: 0.1
    default: 0.7
    width: 1/2
    help: Higher values make output more random, lower values more focused
    translate: false
