name: SEO Metadata
icon: seo
preview: fields
wysiwyg: true
fields:
  metaTitle:
    label: Meta Title
    type: text
    help: Title for search engines. See also the site settings.

  metaDescription:
    label: Meta Description
    type: textarea
    buttons: false
    maxlength: 160
    counter: true
    help: Description for search engines (preferably max 160 characters)

  metaKeywords:
    label: Keywords
    type: tags
    help: Comma-separated keywords
    width: 1/2

  canonicalUrl:
    label: Canonical URL
    type: url
    help: Custom canonical URL
    width: 1/2

  noIndex:
    label: Hide from search engines
    type: toggle
    text: [yes, no]
    width: 1/2

  separator1:
    label:
    type: info
    text: Social Media Settings
    theme: positive

  ogTitle:
    label: Social Media Title
    type: text
    placeholder: "{{ page.title }}"
    help: Title for social media shares. Uses the meta title if empty.

  ogDescription:
    label: Social Media Description
    type: textarea
    buttons: false
    maxlength: 160
    counter: true
    help: Description for social media. Uses the meta description if empty.

  ogImage:
    label: Social Media Image
    type: files
    max: 1
    layout: cards
    size: small
    help: "Recommended: 1200×630px for Facebook/WhatsApp. Twitter prefers 2:1 (800×400px), but 1200×630 works well for both."
