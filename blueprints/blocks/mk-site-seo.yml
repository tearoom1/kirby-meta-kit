name: SEO Settings
icon: seo
preview: fields
wysiwyg: true
fields:
  appendSiteName:
    label: Append Site Name to Titles
    type: toggle
    text:
      - 'No'
      - 'Yes'
    default: true
    width: 1/2
    help: Automatically add site name to all page titles (e.g., "Page Title | Site Name")

  titleSeparator:
    label: Title Separator
    type: select
    options:
      - { value: '|', text: '| (pipe)' }
      - { value: '-', text: '- (dash)' }
      - { value: '–', text: '– (en dash)' }
      - { value: '—', text: '— (em dash)' }
      - { value: '•', text: '• (bullet)' }
      - { value: '/', text: '/ (slash)' }
    default: '|'
    width: 1/2
    help: Separator between page title and site name
    when:
      appendSiteName: true

  metaTitle:
    label: Overwrite Site Name
    type: text
    placeholder: "{{ site.title }}"
    help: >
      Overwrite the site name.
    when:
      appendSiteName: true

  metaDescription:
    label: Default Meta Description
    type: textarea
    buttons: false
    help: Default description for all pages. Max 160 characters.

  metaKeywords:
    label: Default Keywords
    type: tags
    help: Comma-separated list of default keywords for all pages.
    width: 1/2

  metaAuthor:
    label: Default Author
    type: text
    help: The default author name
    width: 1/2

  robots:
    label: Set a robots directive
    type: select
    options:
      - { value: 'index, follow', text: 'Index, Follow' }
      - { value: 'noindex, follow', text: 'No Index, Follow' }
      - { value: 'index, nofollow', text: 'Index, No Follow' }
      - { value: 'noindex, nofollow', text: 'No Index, No Follow' }
    width: 1/2

  ogImage:
    label: Default Social Media Image
    type: files
    max: 1
    layout: cards
    image:
      ratio: 120/63
      cover: true
    size: medium
    query: site.images
    help: Default image for social media sharing (1200×630px recommended)
