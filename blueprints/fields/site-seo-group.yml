label: SEO Settings
type: group
fields:
  seoReview:
    label: AI Content Review
    type: mk-review

  appendSiteName:
    label: Append Site Name to Titles
    type: toggle
    text:
      - 'No'
      - 'Yes'
    default: true
    help: Automatically add site name to all page titles (e.g., "Page Title | Site Name")
    width: 1/4

  appendSiteNameTo:
    label: Append Site Name to
    type: checkboxes
    columns: 2
    options:
      meta: "Meta Title"
      og: "OG Title"
    default:
      - meta
      - og
    when:
      appendSiteName: true
    width: 1/4

  metaTitle:
    label: Overwrite Site Name
    type: text
    placeholder: "{{ site.title }}"
    help: >
      Overwrite the site name. Will be appended to page titles if "Append Site Name to Titles" is enabled.
    when:
      appendSiteName: true
    width: 1/4

  titleSeparator:
    label: Title Separator
    type: select
    options:
      - { value: '|', text: '| (pipe)' }
      - { value: '-', text: '- (dash)' }
      - { value: '–', text: '– (en dash)' }
      - { value: '—', text: '— (em dash)' }
      - { value: '•', text: '• (bullet)' }
      - { value: '/', text: '/ (slash)' }
    default: '|'
    help: Separator between page title and site name
    when:
      appendSiteName: true
    width: 1/4

  metaDescription:
    label: Default Meta Description
    type: mk-description
    fieldType: meta
    maxlength: 180
    width: 1/2
    help: Default description for search engines. Include primary keyword and a call-to-action.
    width: 1/2

  metaAuthor:
    label: Default Author
    type: text
    help: The default author name. This field has no influence on SEO.
    width: 1/4

  robots:
    label: Default robots directive
    type: select
    options:
      - { value: 'index, follow', text: 'Index, Follow' }
      - { value: 'noindex, follow', text: 'No Index, Follow' }
      - { value: 'index, nofollow', text: 'Index, No Follow' }
      - { value: 'noindex, nofollow', text: 'No Index, No Follow' }
    width: 1/4
    translate: false

  ogImage:
    label: Default Social Media Image
    type: files
    max: 1
    layout: cards
    image:
      ratio: 120/63
      cover: true
    size: large
    query: site.images
    help: Default image for social media sharing (1200×630px recommended)
    width: 1/2
